# =============================================================================
# Aethel Workspace — Development Docker Compose
# Usage: docker compose up
# Requires: .env file (copy from .env.example and fill in values)
# =============================================================================

name: aethel-workspace

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 16
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aethel_dev}
      POSTGRES_USER: ${POSTGRES_USER:-aethel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Reference only — NOT for production use.
      # The Go migrator (aethel migrate up) is the authoritative migration runner.
      # Uncomment to seed a brand-new dev database from raw SQL:
      # - ./aethel-core/internal/database/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-aethel} -d ${POSTGRES_DB:-aethel_dev}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Backend (aethel-core)
  # NOTE: Requires go.mod to exist. Run `make build-be` first or let this
  # service build via the Dockerfile.
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./aethel-core
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AETHEL_ENV: development
      AETHEL_DB_DSN: ${AETHEL_DB_DSN:-postgres://${POSTGRES_USER:-aethel}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-aethel_dev}?sslmode=disable}
      AETHEL_DB_PASSWORD: ${AETHEL_DB_PASSWORD:-}
      AETHEL_JWT_SECRET: ${AETHEL_JWT_SECRET:?AETHEL_JWT_SECRET is required}
      AETHEL_JWT_RSA_PRIVATE_KEY: ${AETHEL_JWT_RSA_PRIVATE_KEY:-}
      AETHEL_SMTP_PASSWORD: ${AETHEL_SMTP_PASSWORD:-}
    ports:
      - "8080:8080"
    volumes:
      # Live blueprint reload in development — blueprints are NOT baked into
      # the image in dev mode; they're read from disk on each request.
      - ./blueprints:/app/blueprints:ro
    command: ["/bin/aethel", "serve", "--watch-blueprints"]

  # ---------------------------------------------------------------------------
  # Frontend (aethel-view)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./aethel-view
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NUXT_PUBLIC_API_BASE_URL: ${NUXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
    ports:
      - "3000:3000"

volumes:
  pgdata:
    name: aethel_pgdata_dev
