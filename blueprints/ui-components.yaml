# yaml-language-server: $schema=false
# Aethel Workspace — UI Block Registry
# Defines available block types for the admin page builder.
# IT admins place these blocks via /admin/navigation — they do NOT edit this file.
# To add a new block type: implement the Vue component in app/components/blocks/,
# then register it here.
---
metadata:
  version: "1.0.0"
  engine_target: "aethel-view-1.x"
  strict_validation: true

blocks:
  - id: "BlockStatCard"
    component: "blocks/BlockStatCard"
    label: "Stat Card"
    icon: "i-lucide-bar-chart-2"
    description: "Single metric with label, value, and trend indicator"
    props:
      title: { type: string, required: true }
      value: { type: string, required: true }
      icon: { type: string, required: false, default: "i-lucide-hash" }
      trend: { type: string, required: false, enum: [up, down, neutral] }

  - id: "BlockDataTable"
    component: "blocks/BlockDataTable"
    label: "Data Table"
    icon: "i-lucide-table"
    description: "Sortable, filterable table bound to a data source"
    props:
      title: { type: string, required: true }
      columns: { type: array, required: true }
      rows: { type: array, required: false, default: [] }

  - id: "BlockFormBuilder"
    component: "blocks/BlockFormBuilder"
    label: "Form"
    icon: "i-lucide-form-input"
    description: "Dynamic form rendered from a field schema"
    props:
      title: { type: string, required: true }
      fields: { type: array, required: true }

  - id: "BlockTimeline"
    component: "blocks/BlockTimeline"
    label: "Timeline"
    icon: "i-lucide-git-commit-vertical"
    description: "Chronological event list with icons and timestamps"
    props:
      title: { type: string, required: true }
      events: { type: array, required: true }

  - id: "BlockRichText"
    component: "blocks/BlockRichText"
    label: "Rich Text"
    icon: "i-lucide-text"
    description: "Editable rich text notice or instruction block"
    props:
      title: { type: string, required: false }
      content: { type: string, required: true }
      editable: { type: boolean, required: false, default: false }

  - id: "BlockQuickActions"
    component: "blocks/BlockQuickActions"
    label: "Quick Actions"
    icon: "i-lucide-zap"
    description: "Horizontal button group linking to routes or actions"
    props:
      title: { type: string, required: false }
      actions: { type: array, required: true }
