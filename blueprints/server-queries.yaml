# yaml-language-server: $schema=./schemas/server-queries.schema.json
# Aethel Workspace — Server Queries Blueprint
# Externalises performance-critical SQL for aethel-core (Go backend).
# Named queries are loaded at startup via prepared statements.
# Engine: PostgreSQL 16+  |  Blueprint version: 1.0.0
#
# Convention reference: docs/server-blueprint-conventions.md §2
# Only complex queries belong here (JOINs, UNIONs, report aggregations).
# Simple CRUD is generated by the repository layer — not in this file.
#
# ─── PARAM NOTATION ─────────────────────────────────────────────────────────
# Positional parameters use $1, $2, … notation (PostgreSQL wire protocol).
# Each entry in `params` is a PostgreSQL type string, ordered to match $N.
# ─────────────────────────────────────────────────────────────────────────────
---
metadata:
  version: "1.0.0"
  engine_target: "postgresql-16-sql"
  strict_validation: true

global_query_defaults:
  timeout_ms: 5000
  enable_query_plan_caching: true
  max_rows_per_page: 50

queries:
  # ══════════════════════════════════════════════════════════════════════════
  # PILLAR 1 — DISPATCH MANAGEMENT (Inbound & Outbound Tracking)
  # TODO: Add production queries when Phase 2 (aethel-core) begins.
  # ══════════════════════════════════════════════════════════════════════════
  dispatch:
    # TODO: Replace placeholder with real implementation in Phase 2.
    fetch_active_inbox_by_department:
      statement: |
        SELECT
          id,
          tracking_number,
          sender_name,
          subject_line,
          priority_level,
          created_at
        FROM dispatches
        WHERE assigned_department_id = $1
          AND status_state IN ('PENDING_ASSIGNMENT', 'UNDER_REVIEW')
        ORDER BY created_at DESC
        LIMIT $2 OFFSET $3;
      params:
        - "uuid"     # $1: assigned_department_id
        - "integer"  # $2: limit
        - "integer"  # $3: offset

  # ══════════════════════════════════════════════════════════════════════════
  # PILLAR 2 — GREEN NOTING & APPROVAL WORKFLOW
  # TODO: Add production queries when Phase 2 (aethel-core) begins.
  # ══════════════════════════════════════════════════════════════════════════
  workflow:
    # TODO: Replace placeholder with real implementation in Phase 2.
    fetch_minute_sheet_timeline:
      statement: |
        SELECT
          gn.id AS note_id,
          gn.sequence_order,
          gn.content_body,
          gn.cryptographic_hash,
          gn.created_at,
          u.full_name AS author_name
        FROM green_notes gn
        INNER JOIN minute_sheets ms ON gn.minute_sheet_id = ms.id
        INNER JOIN users u ON gn.author_officer_id = u.id
        WHERE ms.dispatch_id = $1
        ORDER BY gn.sequence_order ASC;
      params:
        - "uuid"  # $1: dispatch_id

  # ══════════════════════════════════════════════════════════════════════════
  # PILLAR 3 — RBAC & IMMUTABLE AUDIT LEDGER
  # TODO: Add production queries when Phase 2 (aethel-core) begins.
  # ══════════════════════════════════════════════════════════════════════════
  governance:
    # TODO: Replace placeholder with real implementation in Phase 2.
    query_audit_ledger_range:
      statement: |
        SELECT
          id,
          actor_user_id,
          action_event_type,
          target_resource_id,
          created_at
        FROM audit_ledger
        WHERE created_at >= $1
          AND created_at <= $2
        ORDER BY created_at DESC;
      params:
        - "timestamptz"  # $1: range_start
        - "timestamptz"  # $2: range_end
