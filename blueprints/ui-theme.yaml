# yaml-language-server: $schema=false
# Aethel Workspace — UI Branding Seed
# Seed values loaded on first boot and stored in branding_configs table.
# After first boot, these values are managed via /admin/branding in the UI.
# Only two fields matter to IT: primary and neutral — everything else is developer default.
---
metadata:
  version: "1.0.0"
  engine_target: "aethel-core-1.x"
  strict_validation: true

branding:
  primary_color: "#4f46e5"       # indigo-600 — hex color, overridable in admin UI
  neutral_palette: "slate"        # tailwind palette name: slate | zinc | gray | stone
  font_family: "Inter"            # loaded from Google Fonts
  wordmark: "Aethel Workspace"    # organization display name in sidebar
  logo_path: ""                   # path to logo file; leave empty to show wordmark only
