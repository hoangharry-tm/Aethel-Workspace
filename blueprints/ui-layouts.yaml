# yaml-language-server: $schema=false
# Aethel Workspace — Navigation Seed
# Seed values loaded on first boot and stored in system_settings (key: nav_config).
# After first boot, navigation is managed via /admin/navigation in the UI.
# IT admins do NOT edit this file directly.
---
metadata:
  version: "1.0.0"
  engine_target: "aethel-core-1.x"
  strict_validation: true

nav_seed:
  - group: "Reception"
    required_permission: "dispatch.view"
    roles: ["RECEPTION", "ADMIN"]
    items:
      - { label: "Dashboard",   icon: "i-lucide-layout-dashboard", route: "/dashboard" }
      - { label: "Inbound",     icon: "i-lucide-inbox",            route: "/dispatch/inbound" }
      - { label: "Outbound",    icon: "i-lucide-send",             route: "/dispatch/outbound" }

  - group: "My Work"
    required_permission: null
    roles: ["USER", "RECEPTION", "ADMIN"]
    items:
      - { label: "My Documents",    icon: "i-lucide-files",   route: "/my-documents" }
      - { label: "Submit Outgoing", icon: "i-lucide-file-up", route: "/outgoing/new" }
      - { label: "Search",          icon: "i-lucide-search",  route: "/search" }

  - group: "Administration"
    required_permission: "admin.access"
    roles: ["ADMIN"]
    items:
      - { label: "Users",           icon: "i-lucide-users",         route: "/admin/users" }
      - { label: "Document Types",  icon: "i-lucide-tag",           route: "/admin/document-types" }
      - { label: "Routing Rules",   icon: "i-lucide-git-merge",     route: "/admin/routing-rules" }
      - { label: "Escalation",      icon: "i-lucide-bell-ring",     route: "/admin/escalation" }
      - { label: "Audit Log",       icon: "i-lucide-shield",        route: "/admin/audit-log" }
      - { label: "Reports",         icon: "i-lucide-bar-chart-2",   route: "/admin/reports" }
      - { label: "Navigation",      icon: "i-lucide-layout-list",   route: "/admin/navigation" }
      - { label: "Settings",        icon: "i-lucide-settings",      route: "/admin/settings" }
      - { label: "Branding",        icon: "i-lucide-palette",       route: "/admin/branding" }
