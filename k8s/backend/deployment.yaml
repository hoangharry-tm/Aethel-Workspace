---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aethel-core
  namespace: aethel-workspace
  labels:
    app.kubernetes.io/name: aethel-core
    app.kubernetes.io/part-of: aethel-workspace
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: aethel-core
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aethel-core
        app.kubernetes.io/part-of: aethel-workspace
      annotations:
        # Force re-roll when configmap/secret change (update this value on deploy)
        checksum/config: "placeholder-update-on-deploy"
    spec:
      terminationGracePeriodSeconds: 30
      # Wait for postgres to be reachable before starting
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres 5432; do
                echo "Waiting for postgres..."; sleep 2;
              done
              echo "Postgres is ready."
      containers:
        - name: aethel-core
          # TODO: Replace with your GHCR image — e.g. ghcr.io/your-org/aethel-core:latest
          image: ghcr.io/YOUR_ORG/aethel-core:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: aethel-core-config
            - secretRef:
                name: aethel-core-secret
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            capabilities:
              drop:
                - ALL
