---
# =============================================================================
# Backend Secrets — PLACEHOLDER FILE
# DO NOT commit real credentials here.
#
# To create the secret:
#   kubectl create secret generic aethel-core-secret \
#     --namespace=aethel-workspace \
#     --from-literal=AETHEL_DB_DSN="postgres://..." \
#     --from-literal=AETHEL_JWT_SECRET="$(openssl rand -base64 64)" \
#     --from-literal=AETHEL_SMTP_PASSWORD="..."
#
# For RSA key (if using RS256):
#   kubectl create secret generic aethel-core-secret \
#     --from-file=AETHEL_JWT_RSA_PRIVATE_KEY=./private.pem \
#     ...
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: aethel-core-secret
  namespace: aethel-workspace
  labels:
    app.kubernetes.io/name: aethel-core
    app.kubernetes.io/part-of: aethel-workspace
type: Opaque
stringData:
  # TODO: Replace with real values before applying to cluster
  AETHEL_DB_DSN: postgres://aethel:REPLACE_ME@postgres:5432/aethel_prod?sslmode=require
  AETHEL_DB_PASSWORD: REPLACE_ME
  AETHEL_JWT_SECRET: REPLACE_ME
  AETHEL_JWT_RSA_PRIVATE_KEY: ""
  AETHEL_SMTP_PASSWORD: REPLACE_ME
