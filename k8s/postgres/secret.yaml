---
# =============================================================================
# PostgreSQL Secrets — PLACEHOLDER FILE
# DO NOT commit real credentials here.
#
# To create the secret in your cluster:
#   kubectl create secret generic postgres-secret \
#     --namespace=aethel-workspace \
#     --from-literal=POSTGRES_DB=aethel_prod \
#     --from-literal=POSTGRES_USER=aethel \
#     --from-literal=POSTGRES_PASSWORD=<strong-random-password>
#
# Or use an external secret manager (HashiCorp Vault, AWS Secrets Manager, etc.)
# with the External Secrets Operator:
#   https://external-secrets.io
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: aethel-workspace
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: aethel-workspace
type: Opaque
stringData:
  # TODO: Replace with real values — use `kubectl create secret` or ExternalSecret
  POSTGRES_DB: aethel_prod
  POSTGRES_USER: aethel
  POSTGRES_PASSWORD: REPLACE_ME
