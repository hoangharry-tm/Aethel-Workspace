  namespace: aethel-workspace
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: aethel-workspace
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      protocol: TCP
